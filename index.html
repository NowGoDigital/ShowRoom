<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Sporty Style</title>
    <!-- Font Google: Oswald (untuk judul sporty) & Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        /* --- HERO SECTION STYLE REFERENSI --- */
        .hero-sporty {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            overflow: hidden;
        }

        /* Efek Cahaya Merah Diagonal (Spotlight) */
        .hero-sporty::before, .hero-sporty::after {
            content: '';
            position: absolute;
            top: -50%;
            width: 150%;
            height: 200%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 0, 0, 0.15) 50%, transparent 100%);
            transform: rotate(-30deg);
            z-index: 1;
            pointer-events: none;
        }
        
        .hero-sporty::after {
            transform: rotate(30deg);
            background: linear-gradient(90deg, transparent 0%, rgba(255, 0, 0, 0.1) 50%, transparent 100%);
        }

        /* Garis Neon Merah Atas */
        .neon-line-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            box-shadow: 0 0 20px #ff0000;
            z-index: 10;
        }

        .container-hero {
            position: relative;
            z-index: 5;
            text-align: center;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; /* Kiri (Mobil), Tengah (Teks), Kanan (Motor/Mobil) */
            align-items: center;
            gap: 2rem;
        }

        /* Area Gambar Kendaraan */
        .vehicle-img {
            width: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.4));
            animation: floatVehicle 4s ease-in-out infinite;
        }

        /* Animasi Mengambang Halus */
        @keyframes floatVehicle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Konten Teks Tengah */
        .hero-content {
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Judul Utama Besar & Miring */
        .hero-title {
            font-family: 'Oswald', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            font-style: italic;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: linear-gradient(to bottom, #ffffff 0%, #cccccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* Badge / Logo Box (Mirip Borecelle di gambar) */
        .brand-badge {
            background: #ff0000;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Tombol CTA */
        .btn-glow {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-glow:hover {
            background: #ff0000;
            color: white;
            box-shadow: 0 0 30px #ff0000;
        }

        /* Elemen Dekoratif Sudut */
        .corner-decor {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 0, 0, 0.3);
            z-index: 2;
        }
        .top-left { top: 50px; left: 50px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 50px; right: 50px; border-left: none; border-top: none; }

        /* Responsive Mobile */
        @media (max-width: 992px) {
            .container-hero {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
            .vehicle-img {
                max-width: 300px;
                margin: 0 auto;
            }
            /* Sembunyikan salah satu kendaraan di mobile agar tidak penuh, atau kecilkan */
            .vehicle-right { display: none; } 
            
            .hero-title { font-size: 3rem; }
            .corner-decor { display: none; }
        }
    </style>
</head>
<body>

    <section class="hero-sporty">
        <!-- Garis Neon Atas -->
        <div class="neon-line-top"></div>
        
        <!-- Dekorasi Sudut -->
        <div class="corner-decor top-left"></div>
        <div class="corner-decor bottom-right"></div>

        <div class="container-hero">
            <!-- Kendaraan Kiri (Mobil) -->
            <div class="vehicle-left">
                <!-- Menggunakan gambar mobil sport PNG transparan -->
                <img src="https://purepng.com/public/uploads/large/purepng.com-red-lamborghini-carcarvehicletransportlamborghini-96152466345j25d.png" alt="Sport Car" class="vehicle-img">
            </div>

            <!-- Konten Tengah -->
            <div class="hero-content">
                <div class="brand-badge">
                    <i class="fas fa-tachometer-alt"></i> LOMBOK SPEED
                </div>
                <h1 class="hero-title">
                    AUTOMOTIVE<br>MARKET
                </h1>
                <p class="hero-subtitle">Understanding Trends, Seizing Opportunities</p>
                
                <button class="btn-glow">
                    Lihat Koleksi <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <!-- Kendaraan Kanan (Motor/Mobil Lain) -->
            <div class="vehicle-right">
                <!-- Menggunakan gambar motor sport PNG transparan -->
                <img src="https://purepng.com/public/uploads/large/red-sport-motorcycle-png-12.png" alt="Sport Bike" class="vehicle-img">
            </div>
        </div>
    </section>

</body>
</html>
